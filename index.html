<!DOCTYPE html>
<html>
<head>
    <title>Gemini Chatbot</title>
</head>
<body>

    <h1>My Gemini Chatbot</h1>

    <form method="POST">

        <input
            type="text"
            name="message"
            placeholder="Ask anything..."
            required>

        <button type="submit">
            Send
        </button>

    </form>

    <hr>

    <h3>AI Response:</h3>

    <p>{{ answer }}</p>

</body>
</html>
